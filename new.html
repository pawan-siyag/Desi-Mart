<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desi-Mart</title>
    <link rel="stylesheet" href="new.css">
</head>
<body>

         <div class="login-box">

        <h1>Desi-Mart</h1>

        <p> Create your account...</p>

        <form>

            <label>Full Name</label>

            <input type="text"
            placeholder="Enter your Full Name">

            <label>Mobile-Number</label>

            <input type="number"
            placeholder="Enter your Mobile-Number">

            <label>e-mail</label>
            <input type="mail"
            placeholder="E-mail">

            <label>Address</label>
            <input type="location"
            placeholder="Enter your Current Address">

            <button type="button" id="getotp">Get OTP</button>
            
         
            <input type="number"
            placeholder="Enter OTP" id="input">
            <button type="button" id="OTP">VERIFY OTP</button>

            <hr>

          

        </form>

    </div>


<script src="new.js"></script>
</body>
</html>
