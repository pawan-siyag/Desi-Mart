<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desi-Mart</title>

    <link rel="stylesheet" href="forget.css">
</head>
<body>
    

    <div class="login-box">

        <h1>Forget Password</h1>

        <p> Get your password to continue...</p>

        <form>

            <label>Username</label>

            <input type="text"
            placeholder="Enter your username">

            <label>Restered Mobile Number</label>

            <input type="Mobile-Number"
            placeholder="Enter your Mobile-Number">

            <button type="button" id="getotp">Get OTP</button>

             <input type="number" maxlength="4" id="input"
            placeholder="Enter OTP">
           

            <hr>

            <button class="OTP" type="button">
                verify OTP
            </button>

        </form>

    </div>

<script src="forget.js"></script>
</body>
</html>
